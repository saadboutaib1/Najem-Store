<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0B0B0B" />
    <title>Najem Store - Offline</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, sans-serif;
        background: #0b0b0b;
        color: #f7efe2;
      }

      body {
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
        padding: 24px;
      }

      main {
        max-width: 520px;
        text-align: center;
      }

      h1 {
        color: #c8a24a;
      }

      p {
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Najem Store</h1>
      <p>أنت غير متصل بالإنترنت حاليًا. يرجى التحقق من الاتصال، ثم إعادة المحاولة.</p>
    </main>
  </body>
</html>
